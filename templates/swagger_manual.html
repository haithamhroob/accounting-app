<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Documentation - Manual OpenAPI</title>
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui.css">
    <style>
        html {
            box-sizing: border-box;
            overflow: -moz-scrollbars-vertical;
            overflow-y: scroll;
        }
        
        *,
        *:before,
        *:after {
            box-sizing: inherit;
        }
        
        body {
            margin: 0;
            background: #fafafa;
        }
        
        .swagger-ui .topbar {
            background-color: #1e3a5f;
        }
        
        .swagger-ui .info .title {
            color: #1e3a5f;
        }
        
        .custom-header {
            background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .custom-header h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        
        .custom-header p {
            margin: 0;
            opacity: 0.8;
        }
        
        .notice {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 4px;
            padding: 15px;
            margin: 20px;
            text-align: center;
        }
        
        .notice strong {
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="custom-header">
        <h1>📄 Manual OpenAPI Documentation</h1>
        <p>هذه الوثائق تعتمد على ملف openapi.yaml اليدوي - يمكنك تعديله حسب احتياجاتك</p>
    </div>
    
    <div class="notice">
        <strong>📝 ملاحظة:</strong> يمكنك تعديل ملف <code>/docs/openapi.yaml</code> يدويًا لتحديث هذه الوثائق.
        <br>
        للوثائق المولدة تلقائيًا، استخدم <a href="/api/docs/">/api/docs/</a>
    </div>
    
    <div id="swagger-ui"></div>
    
    <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-standalone-preset.js"></script>
    <script>
        window.onload = function() {
            const ui = SwaggerUIBundle({
                url: "/static/openapi.yaml",  // Will need to serve the YAML file
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "StandaloneLayout",
                persistAuthorization: true,
                displayOperationId: false,
                defaultModelsExpandDepth: 1,
                defaultModelExpandDepth: 1,
            });
            
            window.ui = ui;
        };
    </script>
</body>
</html>
